name: ClipBridge
options:
  bundleIdPrefix: com.clipbridge
  deploymentTarget:
    iOS: "15.0"
  developmentLanguage: zh-Hans

settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "14.0"

# Symlink target — `scripts/build-ios-ipa.sh` writes the xcframework to ../../build/ios.
fileGroups:
  - "../../build/ios/ClipbridgeCore.xcframework"

targets:
  ClipBridge:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - Sources
      # NOT `type: folder` — that ships .xcassets raw, actool never runs, no
      # Assets.car / CFBundleIcons land in the bundle, and TrollStore install
      # fails with error 181 ("将应用添加至图标缓存失败"). Reference the
      # asset catalog directly so Xcode hands it to actool.
      - Resources/Assets.xcassets
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: ClipBridge
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # 只用 audio 后台模式 + AVAudioSession.playback 维持 WebSocket。
        # processing/fetch 我们没在代码里用 BackgroundTasks 调度,留着只会
        # 让 LaunchServices 多检查规则,还可能触发奇怪的注册失败。
        UIBackgroundModes:
          - audio
        # Allow plain ws:// inside trusted LANs as well as wss://.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: "扫描另一台设备显示的配对二维码。"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipbridge.ios
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SUPPORTS_MACCATALYST: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Reference the hand-written entitlements directly. The xcodegen
        # `entitlements:` block above would overwrite the file with an
        # empty plist on every regenerate, dropping our TrollStore keys.
        CODE_SIGN_ENTITLEMENTS: ClipBridge.entitlements
    dependencies:
      # The xcframework wraps a STATIC archive (libclipbridge_core.a). Linker
      # pulls its symbols into the app binary at build time. Setting embed:
      # true would copy the .a file into the Frameworks/ directory of the
      # final .app bundle, which iOS LaunchServices then rejects on install
      # ("Unable to register" / TrollStore error 181) because the file isn't
      # a valid .framework or .dylib. embed: false skips the copy step;
      # everything still gets linked correctly.
      - framework: ../../build/ios/ClipbridgeCore.xcframework
        embed: false
        codeSign: false
